name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: cd Server && npm install
      - run: cd Server && npm test
      - name: Deploy to Render
        if: success()
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}
